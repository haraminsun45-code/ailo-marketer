<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1350" viewBox="0 0 1080 1350">
  <rect width="100%" height="100%" fill="#f3f2f6"/>
  <rect x="70" y="70" width="940" height="1210" rx="30" fill="#ffffff" stroke="#6d5ea8" stroke-width="3"/>
  <circle cx="952" cy="128" r="28" fill="#6d5ea8"/>
  <text x="952" y="138" text-anchor="middle" font-size="24" font-weight="900" fill="#f3f2f6">A</text>
  <text x="108" y="140" font-size="30" font-weight="900" letter-spacing="5" fill="#6d5ea8">차량 커스터마이징</text>
  <text x="108" y="355" font-size="70" font-weight="900" fill="#211f2a">차량과 팀의 전문성이</text>
<text x="108" y="441" font-size="70" font-weight="900" fill="#211f2a">하나의 프로필이 됩니다</text>
  <rect x="108" y="804" width="864" height="2" fill="#6d5ea8" opacity="0.7"/>
  <text x="108" y="870" font-size="34" font-weight="650" fill="#6a6575">냉동, 야간, 장거리, 정밀 배송처럼 팀과</text>
<text x="108" y="924" font-size="34" font-weight="650" fill="#6a6575">차량의 강점이 명확하게 보이면 더 맞는</text>
<text x="108" y="978" font-size="34" font-weight="650" fill="#6a6575">운송이 연결됩니다.</text>
  <text x="108" y="1244" font-size="28" font-weight="800" fill="#6d5ea8">과한 게임화가 아니라 현실적인 정체성</text>
  <text x="972" y="1244" text-anchor="end" font-size="24" font-weight="900" fill="#6d5ea8">Vehicle Identity</text>
</svg>